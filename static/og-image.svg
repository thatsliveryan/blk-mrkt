<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1a0005;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0a0a;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Grid lines -->
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(230,57,70,0.08)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(230,57,70,0.08)" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="rgba(230,57,70,0.08)" stroke-width="1"/>
  <line x1="800" y1="0" x2="800" y2="630" stroke="rgba(230,57,70,0.08)" stroke-width="1"/>
  <!-- Red accent bar -->
  <rect x="80" y="240" width="6" height="140" fill="#e63946" rx="3"/>
  <!-- BLK MRKT wordmark -->
  <text x="110" y="300" font-family="Arial Black,Arial,sans-serif" font-size="88" font-weight="900"
        fill="white" dominant-baseline="middle" letter-spacing="-2">BLK MRKT</text>
  <!-- Tagline -->
  <text x="110" y="360" font-family="Arial,sans-serif" font-size="28" font-weight="400"
        fill="rgba(255,255,255,0.55)" dominant-baseline="middle" letter-spacing="4">UNDERGROUND MUSIC DROPS</text>
  <!-- Bottom detail -->
  <text x="110" y="540" font-family="Arial,sans-serif" font-size="18"
        fill="rgba(230,57,70,0.7)" letter-spacing="2">CLAIM FIRST · OWN RARE · STREAM NOW</text>
  <!-- Decorative circles -->
  <circle cx="1050" cy="315" r="180" fill="none" stroke="rgba(230,57,70,0.12)" stroke-width="2"/>
  <circle cx="1050" cy="315" r="120" fill="none" stroke="rgba(230,57,70,0.08)" stroke-width="1"/>
  <circle cx="1050" cy="315" r="60" fill="rgba(230,57,70,0.06)"/>
  <!-- Play triangle -->
  <polygon points="1030,295 1080,315 1030,335" fill="rgba(230,57,70,0.5)"/>
  <!-- Border -->
  <rect x="2" y="2" width="1196" height="626" rx="0" fill="none" stroke="rgba(230,57,70,0.15)" stroke-width="2"/>
</svg>